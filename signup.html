<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - CampusConnect</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="left-section">

            <h1>Join CampusConnect 🚀</h1>

            <p>
                Connect with your college community,
                share notes, discover events, and grow together.
            </p>

        </div>

        <div class="right-section">

            <div class="login-box">

                <h2>Create Account ✨</h2>

                <form id="signupForm">

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter Full Name"
                        required
                    >

                    <input
                        type="email"
                        id="signupEmail"
                        placeholder="Enter Email"
                        required
                    >

                    <input
                        type="password"
                        id="signupPassword"
                        placeholder="Create Password"
                        required
                    >

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required
                    >

                    <button type="submit">
                        Signup
                    </button>

                </form>

                <p class="signup-text">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
