<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>CampusConnectLogin</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">

            <div class="left-section">
                <h1>CampusConnect</h1>
                <p>
                    Your college community platfrom for notes, events, marketplace, and student networking.
                </p>
        </div>

        <div class="right-section">

            <div class="login-box">

                <h2>Welcome Back👏</h2>

                <form id="loginForm">

                    <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                    required
                    >

                    <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required
                    >

                    <button type="submit">
                        Login
                    </button>
                </form>

                <p class="signup-text">
                    Don't have an account?
                    <a href="signup.html">Signup</a>
                </p>

            </div>
        </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
